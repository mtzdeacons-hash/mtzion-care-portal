<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Care Ministry"/>
  <meta name="theme-color" content="#1B3A5C"/>
  <title>Mt. Zion Care Ministry</title>
  <link rel="manifest" href="/manifest.json"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D2238; font-family: 'Source Sans 3', sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #0D2238;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      color: #C9A84C; font-family: Georgia, serif; font-size: 22px;
    }
    #loading .cross { font-size: 52px; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div id="loading">
    <div class="cross">✝</div>
    <div>Mt. Zion Care Ministry</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.4);font-family:sans-serif;">Loading…</div>
  </div>
  <div id="root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import App from './mtzion-portal.jsx';
    const loading = document.getElementById('loading');
    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    if (loading) loading.style.display = 'none';
  </script>
</body>
</html>
